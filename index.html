<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>首頁</title>

<style>
    body{
        font-family: "Hiragino Kaku Gothic ProN","Microsoft JhengHei",sans-serif;
        background: #f7f6f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card{
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        text-align: center;
    }

    h1{
        margin-bottom: 20px;
        color: #444;
    }

    /* 按鈕樣式 */
    .btn{
        display: inline-block;
        padding: 12px 25px;
        background: #a5d6a7;
        color: #333;
        text-decoration: none;
        border-radius: 10px;
        font-size: 16px;
        transition: 0.3s;
    }

    .btn:hover{
        background: #81c784;
        transform: translateY(-2px);
    }
</style>
</head>

<body>

<div class="card">
    <h1>我的網站</h1>

    <!-- 超連結按鈕 -->
    <a href="https://qse1028.github.io/qse.github.io/%E8%AA%B2%E8%A1%A8" class="btn">查看課表</a>
</div>

</body>
</html>
